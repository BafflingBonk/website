<div>
  <h2>Artworks</h2>
  <p>Here are some of our artworks:</p>

<div class="artworks-container">
  @for (artwork of artworks; track artwork.id) {
    <div class="artwork-card">
      <h5>{{ artwork.title }}</h5>
      <img class="artwork-image" [src]="artwork.imageUrl" [alt]="artwork.title">
    </div>
  }
</div>
